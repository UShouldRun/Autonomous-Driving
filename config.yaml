env:
  camera_resolution: [32, 32]      # H x W — must match E-puck camera in Webots

action_space:
  type: continuous                  # overridden by --agent flag in train.py

observation:
  # Convert RGB → single-channel grayscale. When true, the camera observation
  # has shape (H, W, 1); when false, (H, W, 3). Bounds/dtype stay float32 [0, 1].
  grayscale: false
  # Speed (m/s) used to normalise state[0]. Speeds above this are clipped to 1.0.
  max_speed: 15.0
  # If true, LiDAR ranges are scaled from [0, lidar_max_range] → [0, 1].
  # If false, ranges pass through as float32 metres and the obs-space upper
  # bound becomes lidar_max_range instead of 1.0.
  normalize_lidar: true
  # Upper bound (m) of LiDAR ranges — must match the clip applied by
  # WebotsEnv.get_lidar_scan() (currently 10 m).
  lidar_max_range: 10.0

reward:
  type: dense                       # overridden by --reward flag in train.py
  # dense / ttc shared weights
  w1: 1.0                           # progress weight
  w2: 0.5                           # alignment / deviation penalty weight
  w3: 1.0                           # collision / safety weight
  # ttc-only
  w4: 10.0                          # terminal penalty weight
  d_safe: 1.0                       # safety radius (metres)
  # collision detection threshold
  collision_threshold: 0.35          # metres — LiDAR below this → terminated

agent:
  learning_rate: 3.0e-4
  batch_size: 64
  gamma: 0.99
  buffer_size: 10000

training:
  total_timesteps: 50000            # reduce for a quick smoke test
  checkpoint_every_n_steps: 200000  # Save a checkpoint every N timesteps (0 disables)

episode:
  max_steps: 100000            # Truncate episode after this many steps (0 disables) — 100s at 10ms/step
  stall_speed_threshold: 0     # m/s — below this counts as "stalled"
  stall_steps: 1500            # Consecutive stalled steps before truncation — 15s at 10ms/step

monitoring:
  # LiDAR distance (m) below which a step counts as a near-miss (but not a
  # collision). A near-miss is a step where the closest LiDAR reading is in
  # the band (collision_threshold, near_miss_threshold].
  near_miss_threshold: 1.0        # metres
  # Lap detection: the car must first travel this far from spawn...
  lap_departure_distance: 20.0    # metres
  # ...then return within this distance to register a lap completion.
  lap_return_distance: 5.0        # metres
  # Print a metrics summary every N completed episodes during training.
  summary_every_n_episodes: 10
  # Write training metrics to a CSV file in results/.
  csv_log: true

obstacles:
  # Master switch. When false the obstacle subsystem is fully inert — no
  # nodes are spawned, no per-step work is done. Enable via --obstacles in
  # train.py / evaluate.py (which sets this to true at runtime).
  enabled: false
  # Spawn cadence is measured in car-travel distance rather than wallclock
  # or sim steps, so behaviour is independent of vehicle speed and time-step.
  spawn_interval_min_m: 30.0      # metres of progress before a new spawn is allowed (min)
  spawn_interval_max_m: 70.0      # metres of progress before a new spawn is allowed (max)
  # Where (relative to the car) to place a freshly-spawned barrel.
  distance_ahead_min: 15.0        # metres ahead of the car (min)
  distance_ahead_max: 35.0        # metres ahead of the car (max)
  # Hard safety floor — the spawn distance is clipped up to at least this
  # value so a barrel can never appear right in front of the car.
  min_spawn_distance: 10.0        # metres
  # Lateral spread, perpendicular to the car's forward axis, sampled
  # uniformly in [-lateral_offset_max, +lateral_offset_max]. The road half
  # the car drives on is ~10.75m wide, so ±4m keeps barrels in-lane.
  lateral_offset_max: 4.0         # metres
  # Cap on simultaneous barrels in the scene at any one time.
  max_active: 3
  # Distance (m) the car must be past a barrel before it is recycled
  # (removed from the scene). Slight buffer so a barrel doesn't vanish the
  # instant the bumper passes it.
  recycle_behind_distance: 3.0    # metres
  # Physical dimensions of the barrel (visual + boundingObject).
  barrel_radius: 0.4              # metres
  barrel_height: 1.0              # metres
  # Z-coordinate of the barrel centre (this world uses ENU / Z-up). With
  # height=1.0 and Z=0.5 the cylinder sits flush on the Z=0 ground plane.
  barrel_z: 0.5
  # RGB baseColor for the barrel's PBRAppearance. Orange is the canonical
  # traffic-cone hue and contrasts strongly against the road surface.
  barrel_color: [1.0, 0.4, 0.0]
